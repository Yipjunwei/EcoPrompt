# ECO Prompt — Docker Compose (Local Development)
#
# Services:
#   cleaner    → port 5001  (NLP prompt cleaning)
#   analytics  → port 5002  (metrics store + dashboard)
#   aimodel    → port 5003  (text shortener SLM)
#   chat       → port 5000  (main user-facing app)
#   postgres   → port 5432  (analytics DB)
#
# Usage:
#   1. Copy .env.example to .env and fill in your GROQ_API_KEY (and Postgres vars)
#   2. docker compose up --build

services:

  postgres:
    image: postgres:16-alpine
    container_name: eco-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eco}
      - POSTGRES_USER=${POSTGRES_USER:-eco}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"   
    volumes:
      - eco_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eco} -d ${POSTGRES_DB:-eco}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cleaner:
    build: ./services/cleaner-service
    container_name: eco-cleaner
    ports:
      - "5001:5001"
    environment:
      - CLEANER_PORT=5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  analytics:
    build: ./services/analytics-service
    container_name: eco-analytics
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - ANALYTICS_PORT=5002
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aimodel:
    build: ./services/aimodel-service
    container_name: eco-aimodel
    ports:
      - "5003:5003"
    environment:
      - AIMODEL_PORT=5003
      - BASE_MODEL=t5-small
      - LORA_PATH=/models/out_lora_t5_query_cleaner
    volumes:
      - ./slm-training/out_lora_t5_query_cleaner:/models/out_lora_t5_query_cleaner
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  chat:
    build: ./services/chat-service
    container_name: eco-chat
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - CHAT_PORT=5000
      - CLEANER_URL=http://cleaner:5001
      - ANALYTICS_URL=http://analytics:5002
      - AIMODEL_URL=http://aimodel:5003
    depends_on:
      cleaner:
        condition: service_healthy
      analytics:
        condition: service_healthy
      aimodel:
        condition: service_healthy
    restart: unless-stopped

volumes:
  eco_pgdata: