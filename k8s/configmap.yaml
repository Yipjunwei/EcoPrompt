apiVersion: v1
kind: ConfigMap
metadata:
  name: ecoprompt-config
  namespace: ecoprompt
data:
  # ── LLM ──────────────────────────────────────────────────────────────────────
  GROQ_MODEL: "llama-3.1-8b-instant"

  # ── Service ports ─────────────────────────────────────────────────────────────
  CHAT_PORT:      "5000"
  CLEANER_PORT:   "5001"
  ANALYTICS_PORT: "5002"
  AIMODEL_PORT:   "5003"

  # ── Internal service discovery (Kubernetes ClusterIP DNS) ────────────────────
  CLEANER_URL:   "http://cleaner-svc:5001"
  ANALYTICS_URL: "http://analytics-svc:5002"
  AIMODEL_URL:   "http://aimodel-svc:5003"

  # ── Model config ──────────────────────────────────────────────────────────────
  BASE_MODEL:      "t5-small"
  LORA_PATH:       "/models/out_lora_t5_query_cleaner"
  MAX_SOURCE_LEN:  "256"
  MAX_NEW_TOKENS:  "32"

  # ── Semantic cache ────────────────────────────────────────────────────────────
  CACHE_SIMILARITY_THRESHOLD: "0.92"
  CACHE_MAX_SIZE:             "200"

  # ── Database (non-sensitive) ──────────────────────────────────────────────────
  POSTGRES_DB:   "eco"
  POSTGRES_USER: "eco"
