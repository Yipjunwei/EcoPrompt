apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: ecoprompt
  labels:
    app: analytics
    app.kubernetes.io/part-of: ecoprompt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-svc 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: analytics
          image: ecoprompt/eco-analytics:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: ecoprompt-config
          env:
            # DATABASE_URL contains the password — injected from Secret only
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ecoprompt-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
