apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: ecoprompt
  labels:
    app: chat
    app.kubernetes.io/part-of: ecoprompt
spec:
  # Initial replica count — the HPA will take over and scale between 3 and 10
  replicas: 3
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat
          image: ecoprompt/eco-chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ecoprompt-config
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ecoprompt-secret
                  key: GROQ_API_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ecoprompt-secret
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/debug
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/debug
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
